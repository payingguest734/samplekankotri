  margin:0;

.page{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
  overflow-x:hidden;
  background: 
    /* Ornate card background image */
    url("https://makemykankotri.in/_next/image?url=https%3A%2F%2Fpub-88ca2680fbad47a0b651e8a1b36ee1d7.r2.dev%2Fassets%2Fcml0e56tw0006i60hk7c4zud8%2Fezb87ouwtyv0ybzmldvk.png&w=384&q=85") top center / contain no-repeat,
    /* Cream/beige base color */
    #f7f3e9;
  max-width:100vw;
}

.page-content{
  position:relative;
  width:100%;
  height:100%;
}

.decoration-top-container{
  position:absolute;
  left:50%;
  top:4%;
  transform:translateX(-50%);
  z-index:1;
}

.decoration{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  z-index:1;
}

.decoration-top{
  width:40vw;
  max-width:160px;
  position:relative;
  top:0;
}

.decoration-fort-container{
  position:absolute;
  left:50%;
  top:auto;
  bottom:8%;
  transform:translateX(-50%);
  z-index:1;
}
.decoration-peacock-container{
  position:absolute;
  left:50%;
  top:auto;
  bottom:2%;
  transform:translateX(-50%);
  z-index:1;
  margin-left:-8%;
}

.decoration-peacock-container-left{
  position:absolute;
  left:50%;
  top:auto;
  bottom:2%;
  transform:translateX(-50%) scaleX(-1); /* Flip horizontally */
  z-index:1;
  margin-left:8%;
}

.decoration-fort{
  /* fort stays at bottom via its container; only control size here */
  width:35vw;
  max-width:200px;
}

.decoration-peacock{
  display:block;
  width:45vw;   /* change this to resize peacock */
  max-width:65px;
}

.invite-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:15vh 5vw 25vh;
  box-sizing:border-box;
  text-align:center;
  color:#4b2c16;
  font-family:"Noto Serif", serif;
  z-index:2;
  margin-top: 4%;
  min-height:100vh;
}

.line{
  opacity:0;
  transform:translateY(20px);
  animation: fadeUp 0.8s ease forwards;
  animation-delay: var(--delay, 0s);
  margin:4px 0;
}

.line.title{
  font-size:26px;
  color:#b0202a;
  margin-bottom:6px;
}

.line.names{
  font-size:22px;
  font-weight:600;
  margin-bottom:8px;
}

.line.small{
  font-size:14px;
  word-wrap:break-word;
  word-break:break-word;
  overflow-wrap:break-word;
  max-width:90%;
  line-height:1.5;
}

.line.meta{
  font-size:14px;
  margin-top:10px;
}

.date-image{
  width:85px;
  height:auto;
  opacity:0;
  animation: fadeUp 0.8s ease forwards;
  animation-delay: 0.6s;
}

.name-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  margin-bottom:6px;
}

.name-row .line.small{
  margin:0;
  font-weight:600;
  font-size:18px;
}

.guest-name-highlight{
  color:#d2691e;
  font-weight:600;
  font-size:16px;
  display:inline;
}

.guest-name-highlight span{
  color:#d2691e;
}

<!-- Indic Transliteration Library -->
<script src="https://cdn.jsdelivr.net/npm/indic-transliteration@2/dist/bundle.js"></script>

<script>
// Function to transliterate a single word
async function transliterateWord(word) {
  const wordLower = word.toLowerCase().trim();
  
  // Try using indic-transliteration library (client-side, no API key needed)
  try {
    if (typeof indicTransliterate !== 'undefined') {
      const transliterated = indicTransliterate.transliterate(wordLower, 'gu');
      if (transliterated && transliterated.length > 0) {
        // Handle "bhai" suffix
        if (wordLower.endsWith("bhai")) {
          const baseName = wordLower.replace("bhai", "");
          const baseTransliterated = indicTransliterate.transliterate(baseName, 'gu');
          return baseTransliterated + "ભાઈ";
        }
        return transliterated;
      }
    }
  } catch (e) {
    console.log("Transliteration library not available, trying API fallback");
  }
  
  // Fallback: Use Google Input Tools API (free, no API key needed)
  try {
    const response = await fetch(`https://inputtools.google.com/request?text=${encodeURIComponent(wordLower)}&itc=gu-t-i0-und&num=1`);
    const data = await response.json();
    
    if (data && data[0] === 'SUCCESS' && data[1] && data[1][0] && data[1][0][1]) {
      let transliterated = data[1][0][1][0];
      
      // Handle "bhai" suffix
      if (wordLower.endsWith("bhai")) {
        const baseName = wordLower.replace("bhai", "");
        const baseResponse = await fetch(`https://inputtools.google.com/request?text=${encodeURIComponent(baseName)}&itc=gu-t-i0-und&num=1`);
        const baseData = await baseResponse.json();
        if (baseData && baseData[0] === 'SUCCESS' && baseData[1] && baseData[1][0] && baseData[1][0][1]) {
          transliterated = baseData[1][0][1][0] + "ભાઈ";
        }
      }
      
      return transliterated;
    }
  } catch (e) {
    console.log("API fallback failed, using basic transliteration");
  }
  
  // Final fallback: Basic transliteration using common patterns
  return transliterateBasic(wordLower);
}

// Function to convert English name to Gujarati using transliteration API
async function englishToGujarati(name) {
  if (!name) return "અરવિંદભાઈ ગજેરા"; // Default name
  
  const nameLower = name.toLowerCase().trim();
  
  // Handle underscores: split into multiple words and transliterate each separately
  if (nameLower.includes('_')) {
    const parts = nameLower.split('_').filter(part => part.length > 0);
    const transliteratedParts = await Promise.all(parts.map(part => transliterateWord(part)));
    return transliteratedParts.join(' '); // Join with space
  }
  
  // Single word: transliterate directly
  return await transliterateWord(nameLower);
}

// Basic transliteration fallback (covers common names)
function transliterateBasic(name) {
  const commonMap = {
    "aayush": "આયુષ", "ayush": "આયુષ",
    "arvind": "અરવિંદ", "arvindbhai": "અરવિંદભાઈ",
    "arvindbhai gajera": "અરવિંદભાઈ ગજેરા",
    "princy": "પ્રિન્સી", "deep": "દીપ",
  };
  
  if (commonMap[name]) return commonMap[name];
  
  if (name.endsWith("bhai")) {
    const base = name.replace("bhai", "");
    if (commonMap[base]) return commonMap[base] + "ભાઈ";
  }
  
  // Return capitalized name if no match
  return name.charAt(0).toUpperCase() + name.slice(1);
}

// Function to get URL parameter
function getUrlParameter(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

// Update name on page load
async function updateGuestName() {
  const nameParam = getUrlParameter("name");
  const guestNameElement = document.getElementById("guest-name");
  
  if (guestNameElement && nameParam) {
    const gujaratiName = await englishToGujarati(nameParam);
    guestNameElement.textContent = gujaratiName;
  }
}

// Call on page load
window.addEventListener("DOMContentLoaded", updateGuestName);

// Function to speak invitation with bride, groom, and host names
async function speakInvitation() {
  // Get bride name and convert to Gujarati
  const brideElement = document.getElementById("bride-name");
  const brideEnglish = brideElement ? brideElement.textContent.trim() : "ekta";
  const brideGujarati = await englishToGujarati(brideEnglish.toLowerCase());
  
  // Get groom name and convert to Gujarati
  const groomElement = document.getElementById("groom-name");
  const groomEnglish = groomElement ? groomElement.textContent.trim() : "Vaibhav";
  const groomGujarati = await englishToGujarati(groomEnglish.toLowerCase());
  
  // Get guest name (from URL parameter)
  const guestElement = document.getElementById("guest-name");
  let guestName = guestElement ? guestElement.textContent.trim() : "Arvindbhai Gajera";
  
  // Get host name
  const hostElement = document.getElementById("host-name");
  let hostName = hostElement ? hostElement.textContent.trim() : "Shri Mansukhbhai Madhavjibhai Kheni";

  const hostElement2 = document.getElementById("host-name-2");
  let hostName2 = hostElement2 ? hostElement2.textContent.trim() : "Kheni";
  
  // Build speech text with better pronunciation (English with Indian names)
  // Using English text with Indian names for better pronunciation
  const text = 
    "Padhaaro, " + guestName + ". " +
    guestName + "ne" + hostName2 + " parivar  na Jai Shree Krishna. " +
    guestName + " ne " + brideEnglish +" na lagan ma padahrava bhav bharyu amantran che.";

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'hi-IN'; // Indian accent (Hindi/Gujarati sounding) - better pronunciation
  utterance.rate = 0.85; // Elegant slow speed
  utterance.pitch = 1.0;

  utterance.onend = () => {
    document.getElementById("backgroundMusic").play();
  };

  speechSynthesis.speak(utterance);
}
